name: Build libmpv-android

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Symlink SDK
        working-directory: ./buildscripts
        run: |
          mkdir sdk
          ln -s ${ANDROID_HOME} ./sdk/android-sdk-linux
      - name: Bundle (default)
        working-directory: ./buildscripts
        run: |
          sudo chmod +x bundle_default.sh
          ./bundle_default.sh
      # FLTR-20042: full + encoders-gpl bundles disabled. IT only needs
      # the default flavor; the full bundle still uses --enable-hwaccels
      # which auto-probes for libdav1d at FFmpeg configure time even
      # though our IT-minimal default doesn't need av1, and the
      # encoders-gpl bundle is for GPL-encoding scenarios IT doesn't use.
      # Re-enable these jobs if you need full-feature libmpv builds.
      # - name: Bundle (full)
      #   working-directory: ./buildscripts
      #   run: |
      #     sudo chmod +x bundle_full.sh
      #     ./bundle_full.sh
      # - name: Bundle (encoders-gpl)
      #   working-directory: ./buildscripts
      #   run: |
      #     sudo chmod +x bundle_encoders-gpl.sh
      #     ./bundle_encoders-gpl.sh
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: |
            ./buildscripts/*.jar
            ./buildscripts/artifacts/**
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          draft: true
          prerelease: false
          tag_name: "vnext"
          files: |
            buildscripts/*.zip
            buildscripts/artifacts/**
